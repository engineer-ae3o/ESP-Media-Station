name: CI

on:
    push:
    pull_request:

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Install clang-format
            run: |
                wget https://apt.llvm.org/llvm.sh 
                chmod +x llvm.sh
                sudo ./llvm.sh 21
                sudo apt-get install -y clang-format-21

          - name: Check formatting
            run: |
                find . \
                    -path ./build -prune -o \
                    \( -name "*.cpp" -o -name "*.c" -o -name "*.h" -o -name "*.hpp" \) -print | xargs clang-format-21 --dry-run --Werror

    build-and-analyze:
        runs-on: ubuntu-latest
        container:
            image: espressif/idf:v6.0.1
        steps:
          - uses: actions/checkout@v4
            with:
              submodules: recursive

          - name: Build
            run: |
              . $IDF_PATH/export.sh
              idf.py build size

          - name: Build tests
            run: |
              . $IDF_PATH/export.sh
              idf.py reconfigure
              cd tests
              idf.py build size
              cd ..

          - name: Run Cppcheck
            run: |
              . $IDF_PATH/export.sh
              idf.py reconfigure
              apt-get update
              apt-get install -y cppcheck
              cppcheck --version
              cmake --build build --target cppcheck

          - name: Upload cppcheck report
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: cppcheck-report
              path: build/cppcheck_report.txt
