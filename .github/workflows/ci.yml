name: CI

on:
    push:
    pull_request:

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4

          - name: Install clang-format
            run: |
                wget https://apt.llvm.org/llvm.sh 
                chmod +x llvm.sh
                sudo ./llvm.sh 21
                sudo apt-get install -y clang-format-21
                wget -O - https://apt.kitware.com/keys/kitware-archive-latest.asc | sudo apt-key add -
                echo "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/kitware.list
              
          - name: Check formatting
            run: |
                find . \
                    -path ./build -prune -o \
                    \( -name "*.cpp" -o -name "*.c" -o -name "*.h" -o -name "*.hpp" \) -print | xargs clang-format-21 --dry-run --Werror

    build-and-analyze:
        runs-on: ubuntu-latest
        container:
            image: espressif/idf:v6.0.1
        steps:
          - uses: actions/checkout@v4
            with:
              submodules: recursive

          - name: Build
            run: |
              . $IDF_PATH/export.sh
              idf.py build

          - name: cppcheck
            run: |
              . $IDF_PATH/export.sh
              apt-get update && apt-get install -y cppcheck
              cmake --build build --target cppcheck

          - name: Upload cppcheck report
            if: always()
            uses: actions/upload-artifact@v4
            with:
              name: cppcheck-report
              path: build/cppcheck_report.txt
