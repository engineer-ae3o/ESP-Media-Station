name: CI

on:
  push:
  pull_request:

jobs:
  check-formating:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-format-21

      - name: Check formatting
        run: |
          find . \
              -path ./build -prune -o \
              \( -name "*.cpp" -o -name "*.c" -o -name "*.h" -o -name "*.hpp" \) -print | xargs clang-format-21 --dry-run --Werror

  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          . $IDF_PATH/export.sh
          idf.py build size

  build-tests:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build tests
        run: |
          . $IDF_PATH/export.sh
          idf.py reconfigure
          cd unity-app
          idf.py build size

  cppcheck:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Cppcheck
        run: |
          . $IDF_PATH/export.sh
          apt-get update
          apt-get install -y cppcheck
          idf.py build
          cmake --build build --target cppcheck

      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: build/cppcheck_report.txt
